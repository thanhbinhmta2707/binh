<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <title>Binh Blog - Kiếm tiền online</title>
  <meta name="description" content="Blog chia sẻ cách kiếm tiền online, AI tools, kinh nghiệm thực tế">
  <meta name="keywords" content="kiếm tiền online, blog, affiliate, AI tools">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <h1 onclick="goHome()">🚀 Binh Blog</h1>
  <nav>
    <button onclick="goHome()">Trang chủ</button>
    <button id="adminBtn" onclick="showAdmin()">Admin</button>
    <button id="logoutBtn" onclick="logout()">Logout</button>
  </nav>
</header>

<section class="hero">
  <h2>💰 Kiếm tiền online từ con số 0</h2>
  <p>Case study thật – Công cụ AI – Affiliate</p>
</section>

<section id="home">
  <input id="searchInput" placeholder="🔍 Tìm bài viết...">
  <div id="posts" class="grid"></div>
</section>

<section id="postDetail" class="hidden">
  <button onclick="goHome()">← Quay lại</button>
  <h2 id="detailTitle"></h2>
  <p id="detailDate"></p>
  <div id="detailContent"></div>

  <div class="ads">🔥 Quảng cáo / Affiliate</div>
</section>

<section id="admin" class="hidden">
  <h2>Đăng bài</h2>
  <input id="title" placeholder="Tiêu đề">
  <textarea id="content" placeholder="Nội dung"></textarea>
  <input type="file" id="file">
  <button onclick="addPost()">Đăng</button>
</section>

<section id="login">
  <h2>Admin Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Đăng nhập</button>
</section>

<footer class="footer">
  © 2026 Binh Blog
</footer>

<script type="module" src="script.js"></script>
</body>
</html>
